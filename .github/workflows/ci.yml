name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Rust Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install mise
        run: |
          curl -fsSL https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install miseo
        run: cargo install --path .

      - name: Add shims to PATH
        run: echo "$HOME/.miseo/.bin" >> "$GITHUB_PATH"

      - name: Verify mise is available
        run: mise --version

      - name: Configure global Node runtime (mise)
        run: mise use -g node@lts

      - name: Install prettier with miseo
        run: |
          miseo install npm:prettier@3.8.1
          test -L "$HOME/.miseo/.bin/prettier"

      - name: Prettier formats a file via miseo shim
        shell: bash
        run: |
          printf 'const x={a:1}\n' > smoke.js
          prettier --write smoke.js >/dev/null
          diff -u <(printf 'const x = { a: 1 };\n') smoke.js

      - name: Reinstall same version reports already-current
        run: miseo install npm:prettier@3.8.1

      - name: Force reinstall same pinned variant
        run: |
          miseo install npm:prettier@3.8.1 --force
          prettier --check smoke.js >/dev/null

      - name: Uninstall prettier
        run: |
          miseo uninstall npm:prettier
          test ! -e "$HOME/.miseo/.bin/prettier"
          test ! -d "$HOME/.miseo/npm-prettier"

  windows-smoke-test:
    name: Windows Smoke Test
    runs-on: windows-latest
    needs: checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install mise
        uses: jdx/mise-action@v3
        with:
          install: false

      - name: Install miseo
        run: cargo install --path .

      - name: Add shims to PATH
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_PATH -Value "$env:USERPROFILE\.miseo\.bin"

      - name: Verify mise is available
        run: mise --version

      - name: Configure global Node runtime (mise)
        run: mise use -g node@24

      - name: Install prettier with miseo
        shell: pwsh
        run: |
          miseo install npm:prettier@3.8.1
          if (!(Test-Path "$env:USERPROFILE\.miseo\.bin\prettier")) { throw "prettier shim missing" }
          if (!(Test-Path "$env:USERPROFILE\.miseo\.bin\prettier.cmd")) { throw "prettier.cmd shim missing" }
          if (!(Test-Path "$env:USERPROFILE\.miseo\.bin\prettier.ps1")) { throw "prettier.ps1 shim missing" }

      - name: Prettier formats a file via Windows shim
        shell: pwsh
        run: |
          Set-Content -Path smoke.js -Value 'const x={a:1}'
          prettier.cmd --write smoke.js
          $actual = (Get-Content -Raw smoke.js).Replace("`r`n", "`n")
          if ($actual -ne "const x = { a: 1 };`n") {
            throw "unexpected prettier output: $actual"
          }

      - name: Force reinstall same pinned variant
        run: |
          miseo install npm:prettier@3.8.1 --force
          prettier.cmd --check smoke.js

      - name: Uninstall prettier
        shell: pwsh
        run: |
          miseo uninstall npm:prettier
          if (Test-Path "$env:USERPROFILE\.miseo\.bin\prettier") { throw "prettier shim remains" }
          if (Test-Path "$env:USERPROFILE\.miseo\.bin\prettier.cmd") { throw "prettier.cmd shim remains" }
          if (Test-Path "$env:USERPROFILE\.miseo\.bin\prettier.ps1") { throw "prettier.ps1 shim remains" }
          if (Test-Path "$env:USERPROFILE\.miseo\npm-prettier") { throw "prettier install dir remains" }

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [checks, smoke-test, windows-smoke-test]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Validate tag matches Cargo.toml version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(sed -n 's/^version = \"\(.*\)\"$/\1/p' Cargo.toml | head -n1)"
          test -n "$VERSION"
          test "$TAG" = "$VERSION"

      - name: Authenticate crates.io (OIDC)
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package crate
        run: cargo package --locked

      - name: Prepare release artifacts
        shell: bash
        run: |
          VERSION="$(sed -n 's/^version = \"\(.*\)\"$/\1/p' Cargo.toml | head -n1)"
          TARGET="x86_64-unknown-linux-gnu"
          BASENAME="miseo-v${VERSION}-${TARGET}"

          mkdir -p dist
          cp "target/release/miseo" "dist/${BASENAME}"
          tar -C dist -czf "dist/${BASENAME}.tar.gz" "${BASENAME}"
          cp "target/package/miseo-${VERSION}.crate" "dist/"

          (
            cd dist
            sha256sum * > SHA256SUMS
          )

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
